    frames: [port_sidemenu_11, port_sidemenu_12]
    verified: 2026-06-09
  nav_factory:                    # 工廠
    frames: [port_sidemenu_3, port_sidemenu_4]
    verify: runtime
  nav_port:                       # 母港 (sidebar right column, 66x115)
    frames: [port_sidemenu_7]
    verified: 2026-06-09
