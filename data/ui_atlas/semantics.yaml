  nav_hensei:                     # 編成
    frames: [port_sidemenu_5, port_sidemenu_6]
    verified: 2026-06-09
  nav_supply:                     # 補給
    frames: [port_sidemenu_13, port_sidemenu_14]
    verified: 2026-06-09          # 14 = selected variant, observed on supply screen
  nav_equipment:                  # 改装
    frames: [port_sidemenu_9, port_sidemenu_10]
    verify: runtime
