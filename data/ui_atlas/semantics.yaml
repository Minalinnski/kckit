# UI atlas semantic dictionary — perception layer v2.
#
# Maps texture frame names (as seen in scene_dump texture cache ids) to
# semantic element names. At runtime: walk the scene tree, find a visible
# node whose texture matches `frames`, click its live bounds center.
# Multiple frames per element = the button's visual states (normal/hover/
# active) — all map to the same semantic element.
#
# verify: runtime  → labeled from contact sheet, needs one live cross-check
#                    (scene_dump + screenshot on that screen) before trusting
# verified: <date> → confirmed against a live screenshot+dump pair
#
# Labeled with Claude vision from temp/atlas_sheets/*.png on 2026-06-09.
# Build sheets: python tools/atlas_sheet.py <atlas>

# Elements present on most screens (left nav sidebar + top tab bar).
# find_element falls back to this section when the screen section misses.
# Sidemenu frames: normal/selected variants confirmed by runtime y-order on
# two screens (repair 2026-06-09: y194=5,y275=13,y356=9,y439=12sel,y517=3;
# hensei: 6sel,13,9,11,3 — selected item swaps frame).
