      - 満潮改
      notes: DD2隻帯路用
  requirements:
    air_state: none
    air_power_min: 144
    enemy_air_power: 144
    routing_nodes:
    - A
    - E
    - I
    - K
  equip_notes: '制空152~154 (K点144空確); 索敵31.11; 帯路条件: 2DD+1CA/CAV+2CV+1任意。空母は攻撃機中心で彩雲も搭載推奨。DDはDE1隻に換えて先制対潜も可'
