  - ship: 蒼龍改
    equips:
    - 彗星一二型甲
    - 流星改
    - 流星改
    - 試製烈風 後期型
  - ship: 長門改
    equips:
    - 41cm連装砲
    - 41cm連装砲
    - 九一式徹甲弾
    - 零式水上偵察機
  - ship: 赤城改
    equips:
    - 彗星一二型甲
    - 流星改
    - 試製烈風 後期型
    - 彩雲
  - ship: 摩耶改
    equips:
    - 20.3cm連装砲
    - 20.3cm連装砲
    - 零式水上偵察機
    - 零式水上偵察機
  - ship: 時雨改
    equips:
    - 10cm連装高角砲
