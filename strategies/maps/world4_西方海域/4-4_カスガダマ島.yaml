    equips:
    - 甲標的 丙型
    - 試製61cm六連装(酸素)魚雷
    - 61cm五連装(酸素)魚雷
  - ship: 石垣
    equips:
    - 四式水中聴音機
    - 試製15cm9連装対潜噴進砲
  - ship: 八丈
    equips:
    - 四式水中聴音機
