    - A
    - B
    - D
    - H
    - J
  equip_notes: '制空値: ボスJ点均衡36・確保72。瑞雲(熟練)で制空確保を狙う。水上戦闘機があれば更に安定。D点は水上・水中混合のため適宜陣形選択。'
