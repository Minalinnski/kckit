- name: 捞喷火/空母季常（AV+SS+CVL構成）
  fleet:
    type: single
    slots:
    - ship_class:
      - AV
      count: 1
      specific_ships:
      - 塔斯特司令官改
      notes: 旗舰，水上機母艦，試製晴嵐搭載で制空稼ぎ
    - ship_class:
      - SS
      - SSV
      count: 3
      specific_ships:
      - 伊168改
      - 伊504
      - 呂500
    - ship_class:
      - CVL
      count: 2
      specific_ships:
      - 鈴谷航改二
      - 熊野航改二
      notes: CVL<=2，3CVL以上は左ルートへ逸れ
  requirements:
    air_state: supremacy
    air_power_min: 162
    enemy_air_power: 36
    routing_nodes:
    - C
    - E
    - D
    - H
  equip_notes: 制空164~166（画面値），H点162空確。E点でF5すると晴嵐捕獲可能。CVL最大2隻。SS雷撃CIあり（伊168改：試制FaT規格九五式酸素魚雷改×2，伊504/呂500：後期型艦首魚雷(6門)×2）。彩雲(東加ロ林空)搭載で丁字不利回避。
  example:
  - ship: 塔斯特司令官改
    equips:
    - 試製晴嵐
    - 試製晴嵐
    - 試製晴嵐
    - 晴嵐(六三一空)
  - ship: 伊168改
    equips:
    - 試製FaT仕様九五式酸素魚雷改
    - 試製FaT仕様九五式酸素魚雷改
  - ship: 伊504
    equips:
    - 後期型艦首魚雷(6門)
    - 後期型艦首魚雷(6門)
  - ship: 呂500
    equips:
    - 後期型艦首魚雷(6門)
    - 後期型艦首魚雷(6門)
  - ship: 鈴谷航改二
    equips:
    - F4U-1D
    - 天山一二型(村田隊)
    - 天山一二型(友永隊)
    - 零式艦戦53型(岩本隊)
  - ship: 熊野航改二
    equips:
    - 彗星二二型(六三四空/熟練)
    - 天山一二型(村田隊)
    - 九七式艦攻(友永隊)
    - 彩雲
  tags:
  - 捞喷火
  - 空母戦力の投入による兵站線戦闘哨戒
  - F5
  - 晴嵐
