map: 2-1
source: nga_import
notes: 南西諸島近海，boss点H，主要路线C-(E)-D-H，BB系+CV系<=4可固定进boss，3CV系会走B
presets:
- name: 萌新推图（BB+CV混编）
  fleet:
    type: single
    slots:
    - ship_class:
      - BB
      - FBB
      count: 1
      specific_ships:
      - 扶桑
      notes: 旗舰
    - ship_class:
      - CV
      count: 1
      specific_ships:
      - 赤城
    - ship_class:
      - CA
      - CAV
      count: 3
      specific_ships:
      - 鳥海
      - 摩耶
      - 青葉
    - ship_class:
      - CVL
      count: 1
      specific_ships:
      - 瑞鳳
  requirements:
    air_state: supremacy
    air_power_min: 72
    enemy_air_power: 36
    routing_nodes:
    - C
    - E
    - D
    - H
  equip_notes: 制空79（画面値），D点72空優，H点Lv39以下54空確，Lv40以上81空優/162空確。BBは双主砲+水偵、優先度：徹甲弾>水偵>電探>機銃。CVは艦爆+艦攻混載。BBV=0
    かつ CV系<=2 かつ BB系+CV系<=4。
  example:
  - ship: 扶桑
    equips:
    - 41cm連装砲
    - 35.6cm連装砲
    - 零式水上偵察機
    - 零式水上偵察機
  - ship: 赤城
    equips:
    - 九九式艦爆
    - 九七式艦攻
    - 九七式艦攻
    - 九六式艦戦
  - ship: 鳥海
    equips:
    - 20.3cm連装砲
    - 20.3cm連装砲
    - 零式水上偵察機
  - ship: 摩耶
    equips:
    - 20.3cm連装砲
    - 20.3cm連装砲
    - 零式水上偵察機
  - ship: 青葉
    equips:
    - 20.3cm連装砲
    - 20.3cm連装砲
    - 零式水上偵察機
  - ship: 瑞鳳
    equips:
    - 九七式艦攻
    - 九九式艦爆
    - 九六式艦戦
  tags:
  - 萌新推图
  - BB+CV混編
  special_attacks: []
- name: 南西（6SS編成）
  fleet:
    type: single
    slots:
