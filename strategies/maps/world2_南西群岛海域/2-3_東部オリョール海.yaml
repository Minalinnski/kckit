      - 瑞鳳改二乙
      notes: 軽空母、低消費・格子補助
    - ship_class:
      - AV
      count: 1
      specific_ships:
      - 日進甲
      notes: 水上機母艦、夜間瑞雲+水偵で接触・夜戦補助
    - ship_class:
      - DD
      count: 2
      specific_ships:
      - 吹雪改二
      - 曙改二
      notes: 駆逐艦、経験値稼ぎ兼用可
    - ship_class:
      - DD
      count: 1
      specific_ships:
      - 綾波改二
      notes: 駆逐艦
  requirements:
    air_state: supremacy
    air_power_min: 162
    enemy_air_power: 162
    routing_nodes: []
  equip_notes: 制空181。N点162空確。CVには天山一二型(村田隊)・天山一二型甲改二(村田隊/電探装備)・F4U-7・AU-1搭載、熟練甲板要員+航空整備員。CVLには流星改(一航戦/熟練)×2+零式艦戦62型改(熟練/夜間爆戦)+彗星(江草隊)+熟練甲板要員+航空整備員。AVには瑞雲改二(六三四空/熟練)+試製夜間瑞雲(攻撃装備)+零式水上偵察機11型乙(熟練)+甲標的丁型改(蛟龍改)。DDは10cm連装高角砲改+高射装置改×2+GFCS
    Mk.37。索敵28.21。AV水偵1機で接触確保（索敵≤6なら2機推奨）。CV複数空確保で開幕洗光、艦爆補完は中抗艦爆（彗星江草/岩井/暗黒岩井）推奨。
  example:
  - ship: 神鷹改二
    equips:
    - 天山一二型(村田隊)
    - 天山一二型甲
    - F4U-7
    - AU-1
    - 熟練甲板要員+航空整備員
  - ship: 瑞鳳改二乙
    equips:
    - 流星改(一航戦/熟練)
    - 流星改(一航戦/熟練)
    - 零式艦戦64型(熟練爆戦)
    - 彗星(江草隊)
    - 熟練甲板要員+航空整備員
  - ship: 日進甲
    equips:
    - 瑞雲改二(六三四空/熟練)
    - 試製 夜間瑞雲(攻撃装備)
    - 零式水上偵察機11型乙(熟練)
    - 甲標的 丁型改(蛟龍改)
  - ship: 吹雪改二
    equips:
    - 10cm連装高角砲+高射装置
    - 10cm連装高角砲+高射装置
    - GFCS Mk.37
  - ship: 綾波改二
    equips:
    - 10cm連装高角砲+高射装置
    - 10cm連装高角砲+高射装置
    - GFCS Mk.37
  - ship: 曙改二
    equips:
    - 10cm連装高角砲+高射装置
    - 10cm連装高角砲+高射装置
    - GFCS Mk.37
