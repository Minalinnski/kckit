map: 2-2
source: nga_import
notes: バシー海峡，boss点K有空母ヲ级elite，多路线可选，AV/AS带路可固定C-E-F-H-K最优路线
presets:
- name: 萌新推图（随机G路线）
  fleet:
    type: single
    slots:
    - ship_class:
      - AV
      count: 1
      specific_ships: []
      notes: 带路，可放旗舰保护
    - ship_class:
      - BB
      - FBB
      count: 1
      specific_ships: []
      notes: ''
    - ship_class:
      - BB
      - FBB
      - CV
      - CVL
      count: 2
      specific_ships: []
      notes: ''
    - ship_class:
      - CA
      - CAV
      - CL
      - CLT
      count: 2
      specific_ships: []
      notes: ''
  requirements:
    air_state: none
    air_power_min: 81
    enemy_air_power: 18
    routing_nodes:
    - C
    - E
    - G
    - H
    - K
  equip_notes: boss点K司令部等级49以下72空确，50以上81空确。大船越多越容易走G点。
  example:
  - ship: 千歳甲
    equips:
