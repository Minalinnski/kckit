    - 九七式艦攻
    - 九七式艦攻
    - 九六式艦戦
  - ship: 鳥海
    equips:
    - 20.3cm連装砲
    - 20.3cm連装砲
    - 零式水上偵察機
  - ship: 摩耶
    equips:
    - 20.3cm連装砲
    - 20.3cm連装砲
    - 零式水上偵察機
  - ship: 最上
    equips:
    - 20.3cm連装砲
    - 20.3cm連装砲
    - 零式水上偵察機
