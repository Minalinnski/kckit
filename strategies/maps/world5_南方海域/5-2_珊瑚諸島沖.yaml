    - ship_class:
      - DD
      - DE
      count: 4
      specific_ships: []
      notes: 带発煙装置(煙幕)，可轮换低等级DD/DE泡澡；如有喷二(対空CI)可带血多BBV/CV
  requirements:
    air_state: none
    routing_nodes:
    - B
    - C
  equip_notes: C点单向空袭练级。拉烟流：DD带発煙装置(煙幕)，10 10 10 10公式配3个発煙装置。注意CV+CVB<=2且BB系+CV系<=4避免走漩涡。拉烟降低対空击坠及喷二发动率，需多堆发动率。可带额外烟或钢板提高生存。
