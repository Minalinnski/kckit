  equip_notes: boss点O空确351。D点有潜水艦、建议DD带先制対潜(ASW≥100)。D点偷窥：有魚雷单横阵，无魚雷单縦阵。伊勢改二带16inch三連装砲Mk.7+GFCS+41cm三連装砲+瑞雲改二(六三四空/熟練)+零式艦戦53型(岩本隊)+新型高温高圧鍋炉提速。翔鶴带流星改(一航戦/熟練)+天山一二型(村田隊)+零式艦戦62型(爆戦/岩井隊)+烈風改二。瑞鶴带流星改(一航戦/熟練)+天山一二型(村田隊)+彗星(江草隊)+烈風改二戊型(一航戦/熟練)。制空370~373、索敵54.23。
  example:
  - ship: 伊勢改二
