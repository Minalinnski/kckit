- name: 萌新推图 A-C-G-M
  fleet:
    type: single
    slots:
    - ship_class:
      - FBB
      - BB
      count: 1
      speed: 高速
      specific_ships:
      - 金剛改
      - 金剛改二
      - 比叡改
