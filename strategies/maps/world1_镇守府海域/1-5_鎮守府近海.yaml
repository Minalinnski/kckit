  - ship: 五十鈴
    equips:
    - 九三式水中聴音機
    - 九四式爆雷投射機
  - ship: 時雨
    equips:
    - 九三式水中聴音機
    - 九四式爆雷投射機
  - ship: 白露
    equips:
    - 三式水中探信儀
    - 九四式爆雷投射機
  - ship: 満潮
    equips:
    - 九三式水中聴音機
    - 三式爆雷投射機
  tags:
  - 新人向
  - 低司令部等级
  - Lv34以下
  special_attacks: []
