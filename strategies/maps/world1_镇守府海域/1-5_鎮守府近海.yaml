map: 1-5
source: nga_import
notes: 鎮守府近海，boss点J为4艘潜艇，全程单横阵，路线A-D-F-G-J或A-D-E-J
presets:
- name: 新人向·纯反潜小船（司令部34级以下）
  fleet:
    type: single
    slots:
    - ship_class:
      - CL
      count: 1
      specific_ships:
      - 五十鈴
      notes: 旗舰，装备九三式水中聴音機+九四式爆雷投射機
    - ship_class:
      - DD
      count: 1
      specific_ships:
      - 時雨
      notes: 装备九三式水中聴音機+九四式爆雷投射機
    - ship_class:
      - DD
      count: 1
      specific_ships:
      - 白露
      notes: 装备三式水中探信儀+九四式爆雷投射機
    - ship_class:
      - DD
      count: 1
      specific_ships:
      - 満潮
      notes: 装备九三式水中聴音機+三式爆雷投射機
  requirements:
    air_state: none
    routing_nodes:
    - A
    - D
    - F
    - G
    - J
  equip_notes: 全程单横阵。水听+爆雷投射机有套装加成。反潜装备质量不限，挑面板对潜值高的带即可。无需先制对潜。
