map: 1-3
source: nga_import
notes: 製油所地帯沿岸。敵方全程0制空。主要路线为*-F-J打boss，或1-A-D-B-E捞油。
presets:
- name: 萌新推图
  fleet:
    type: single
    slots:
    - ship_class:
      - CVL
      count: 1
      specific_ships:
      - 瑞鳳
      notes: 旗舰，装备舰攻/舰爆
    - ship_class:
      - CA
      - CAV
      count: 1
      specific_ships:
      - 最上
      notes: 重巡洋艦
    - ship_class:
      - DD
      count: 4
      specific_ships:
      - 白露
      - 時雨
      - 満潮
      - 霞
      notes: DD×4で带路条件を满たす
  requirements:
    air_state: none
    routing_nodes:
    - C
    - F
    - J
  equip_notes: 制空0、索敌0。CVLに舰攻×2+舰爆で制空9。DD双主砲、第3砲や魚雷は装備しないこと。
