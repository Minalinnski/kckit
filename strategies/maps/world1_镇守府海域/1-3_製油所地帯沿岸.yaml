- name: 捞油编成（宗谷单舰偷油）
  fleet:
    type: single
    slots:
    - ship_class:
      - AO
      count: 1
      specific_ships:
      - 宗谷
      notes: 南極観測形態・未婚・打孔。装甲82以上（大型钢板×2）。单舰出击。
  requirements:
    air_state: none
    routing_nodes:
    - A
    - D
    - B
    - E
  equip_notes: 宗谷装甲82以上が必要（任务报酬の大型钢板×2装备）。不足分は改修した通常钢板で補う（改修加成0.3×★数）。未婚26HP、中破7HPで擦弾機制により被ダメ0維持。弾耗が非常に低い。D点で大発系装備で火力補強推奨。
  example: []
  tags:
  - 捞油
  - 宗谷
  - 单舰
  - 永动机
  special_attacks: []
- name: 期间限定掉落打捞·基础版（AV+CVL+4DD）
  fleet:
    type: single
    slots:
    - ship_class:
      - AV
      count: 1
      specific_ships: []
      notes: 旗舰。80%确率でD点捞油。短射程推奨。
    - ship_class:
      - CVL
      count: 1
      specific_ships:
      - 大鷹
      notes: MVPを取りやすい。一改大鹰推奨（消耗低）
    - ship_class:
      - DD
      count: 4
      specific_ships: []
      notes: DD×4で带路。赤疲劳で大発装備も可
  requirements:
    air_state: none
    routing_nodes:
    - A
    - D
    - B
    - E
    - F
    - J
  equip_notes: 制空0、索敵0。CVLに对空射击回避なし飞机装备の場合J点で1/10确率で喪失。攻击机18格以内の场合3/14确率で喪失。開幕空袭+開幕雷撃+先手砲撃で低损伤周回。
  example: []
  tags:
  - 期间限定
  - 打捞
  - 捞油
  - AV
  special_attacks: []
- name: 期间限定掉落打捞·山汐丸版（AO+CAV+2DD）
  fleet:
    type: single
    slots:
    - ship_class:
      - AV
      count: 1
      specific_ships:
      - 山汐丸
      notes: 旗舰。脆いため旗舰保护。短射程。
    - ship_class:
      - CA
      - CAV
      count: 1
      specific_ships:
      - 最上
      notes: MVPを取りやすい高火力枠。長射程推奨。
    - ship_class:
      - DD
      count: 2
      specific_ships: []
      notes: 1CAV+2DDで带路。高质量大発DD推奨
  requirements:
    air_state: none
    routing_nodes:
    - A
    - D
    - B
    - E
    - F
    - J
  equip_notes: AO（山汐丸）で100%D点捞油。道中は開幕雷撃後に決着が多い。DDに大発3枚装備で捞油量アップ（DD1隻全消耗9油12弹、大発3枚で9油回収のため枚数増やすほど赤字）。長射程CVL追加も可。
  example: []
  tags:
  - 期间限定
