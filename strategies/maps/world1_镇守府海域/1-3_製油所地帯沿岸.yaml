- name: 捞油编成（神威+大発DD+潜水艦）
  fleet:
    type: single
    slots:
    - ship_class:
      - AO
      count: 1
      specific_ships:
      - 神威改母
      notes: 旗舰。大発動艇（八九式中戦車&陸戦隊）×1＋大発動艇×2
