    routing_nodes:
    - A
    - D
    - B
    - E
  equip_notes: 制空-、索敵-1.33。神威で100%D点捞油。大発系を大量装備して资源回収効率を最大化。DD赤疲劳で大発装備も可。Luigi Torelli改は消耗がより低い。
