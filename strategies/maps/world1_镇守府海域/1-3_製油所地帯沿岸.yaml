      notes: DE可。低弾耗路线で新しく捞ったDEの练习も兼ねる。
  requirements:
    air_state: none
    routing_nodes:
    - F
    - J
  equip_notes: D点捞油なし。低弾耗周回。1CL/CT+4DD/DEで带路F-J。
