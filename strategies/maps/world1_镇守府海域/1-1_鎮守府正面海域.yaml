map: 1-1
source: nga_import
notes: 鎮守府正面海域，罗盘分歧A→B或C(boss)，常用于刷闪，无法稳定进boss
presets:
- name: 刷闪通用（空母/水母型）
  fleet:
    type: single
    slots:
    - ship_class:
      - CV
      - CVL
      - AV
      count: 1
      specific_ships: []
      notes: 旗舰，刷闪目标，最大搭载格带彩云避免喷铝，其余格带熟练度未满攻击机
    - ship_class:
      - SS
      count: 1
      specific_ships: []
      notes: 可开幕非红脸SS，补刀用，可选
    - ship_class:
      - DD
      count: 1
      specific_ships: []
      notes: 狗粮挡枪，可选
  requirements:
    air_state: none
    routing_nodes:
    - A
    - C
  equip_notes: 旗舰最大搭载格带彩云，其余格带攻击机刷熟练度；低等级舰需僚舰带电探或水侦补索敌；喷气机不建议在此刷熟练
  example: []
  tags:
  - 刷闪
  - 熟练度
  special_attacks: []
- name: 刷闪通用（中射程以上舰）
  fleet:
    type: single
    slots:
    - ship_class:
      - BB
      - FBB
      - BBV
      - CA
      - CAV
      - CL
      - CLT
      count: 1
      specific_ships: []
      notes: 旗舰，刷闪目标，中射程以上
    - ship_class:
      - DD
      count: 2
      specific_ships: []
      notes: 狗粮挡枪
    - ship_class:
      - SS
      count: 1
      min_level: 1
      specific_ships: []
      notes: 10级以下不可开幕SS，挡枪降低消耗，可选
  requirements:
    air_state: none
    routing_nodes:
    - A
    - C
  equip_notes: 狗粮无需特殊装备，回港后可不补给
  example: []
  tags:
  - 刷闪
  special_attacks: []
- name: 刷闪通用（短射程舰）
  fleet:
    type: single
    slots:
    - ship_class:
      - DD
      - DE
      - CL
      - CLT
      count: 1
      specific_ships: []
      notes: 旗舰，刷闪目标，短射程
    - ship_class:
      - DD
      count: 1
      specific_ships: []
      notes: 狗粮挡枪
    - ship_class:
      - SS
      count: 1
      min_level: 1
      specific_ships: []
      notes: 10级以下不可开幕SS，挡枪，可选
  requirements:
    air_state: none
    routing_nodes:
    - A
    - C
  equip_notes: 短射程旗舰带1DD会有概率让狗粮先击沉敌舰导致刷闪失败，建议1DD+1不可开幕SS搭配
  example: []
  tags:
  - 刷闪
  special_attacks: []
