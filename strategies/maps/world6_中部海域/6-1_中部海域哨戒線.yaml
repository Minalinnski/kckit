      specific_ships: []
      notes: 旗舰为SS/SSV（任务要求）
    - ship_class:
      - CV
      count: 1
      specific_ships: []
      notes: 高搭载空母
    - ship_class:
      - CL
      count: 1
      specific_ships: []
      notes: ''
  requirements:
