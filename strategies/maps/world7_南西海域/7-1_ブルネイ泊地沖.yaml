  requirements:
    air_state: none
    routing_nodes:
    - D
    - E
    - G
    - H
    - K
  equip_notes: 矢矧改二乙：15.2cm三連装砲改二+甲標的丁型改(蛟龍改)+瑞雲改二(六三四空/熟練)+Type144/147 ASDIC。僚艦DDは先制対潜確保しつつ旗舰のMVPを奪わないよう双水聴配置。高改修水聴は炮撃火力・雷撃回避補正あり。矢矧3番艦で旗舰最後出手確率を最低化。制空値16、索敵8.09。
  example:
  - ship: 睦月改二
    equips:
    - HF/DF + Type144/147 ASDIC
    - 対潜短魚雷(試作初期型)
    - RUR-4A Weapon Alpha改
  - ship: 風雲改二
    equips:
    - 12.7cm連装砲D型改三
    - 三式水中探信儀
    - 三式水中探信儀
  - ship: 矢矧改二乙
    equips:
    - 15.2cm連装砲改二
    - 甲標的 丁型改(蛟龍改)
    - 瑞雲改二(六三四空/熟練)
    - Type144/147 ASDIC
  - ship: 朝霜改二
    equips:
    - 12.7cm連装砲D型改二
    - 四式水中聴音機
    - 四式水中聴音機
  - ship: 夕雲改二
    equips:
    - 12.7cm連装砲D型改二
    - 四式水中聴音機
    - 四式水中聴音機
