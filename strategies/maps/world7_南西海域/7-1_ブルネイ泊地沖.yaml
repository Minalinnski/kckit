map: 7-1
source: nga_import
notes: ブルネイ泊地沖、戦果・刷闪・養殖向け対潜マップ、ボスは潜水艦編成
presets:
- name: 萌新推图 (1CL+4DD、D-E-G-H-K)
  fleet:
    type: single
    slots:
    - ship_class:
      - CL
      count: 1
      speed: 高速
      specific_ships:
      - 五十鈴改
      notes: 旗舰、対潜装備
    - ship_class:
      - DD
      count: 4
      speed: 高速
      specific_ships:
      - 白露改
      - 霞改
      - 満潮改
      - 時雨改
