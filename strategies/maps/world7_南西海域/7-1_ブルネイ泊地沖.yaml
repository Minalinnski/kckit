    routing_nodes:
    - D
    - E
    - G
    - H
    - K
  equip_notes: 全員対潜装備。水聴+爆雷投射機+爆雷の2〜3件組み合わせで対潜補正。3件套が最高補正。水聴2+爆雷1も可。ボスには単横陣使用。制空値0、索敵0。
  example:
  - ship: 白露改
    equips:
    - 三式水中探信儀
    - 三式爆雷投射機
    - 九五式爆雷
  - ship: 五十鈴改
    equips:
    - 九三式水中聴音機
    - 九三式水中聴音機
    - 三式爆雷投射機
  - ship: 霞改
    equips:
    - 九三式水中聴音機
    - 九三式水中聴音機
    - 九四式爆雷投射機
  - ship: 満潮改
    equips:
    - 三式水中探信儀
    - 三式爆雷投射機
    - 九五式爆雷
  - ship: 時雨改
    equips:
    - 三式水中探信儀
    - 九三式水中聴音機
    - 九四式爆雷投射機
  tags:
  - 新手向け
  - 対潜
  - D-E-G-H-K
  special_attacks: []
