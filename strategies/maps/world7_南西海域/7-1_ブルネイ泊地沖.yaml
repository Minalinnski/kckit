      speed: 高速
      specific_ships:
      - 風雲改二
      notes: D型砲+水中探信儀×2、高火力
    - ship_class:
      - CL
      count: 1
      speed: 高速
      specific_ships:
      - 矢矧改二乙
      notes: 3番艦推奨（中射程、開幕対潜・水爆）
    - ship_class:
      - DD
      count: 1
      speed: 高速
      specific_ships:
      - 朝霜改二
      notes: 先制対潜、双水聴配置
