map: 7-2
source: nga_import
notes: タウイタウイ泊地沖、双血条设计，P1路线C-E-G，P2路线B-C-D-I-M，boss点M有制空要求
presets:
- name: 萌新推图 P1 (3DD+1CVL)
  fleet:
    type: single
    slots:
    - ship_class:
      - DD
      count: 3
      specific_ships:
      - 白露改
      - 霞改
      - 満潮改
      notes: 全员配对潜装备
    - ship_class:
      - CVL
      count: 1
      specific_ships:
      - 隼鷹改
      notes: 低速可，负责水上目标
  requirements:
    air_state: none
    air_power_min: 0
    routing_nodes:
    - C
    - E
    - G
  equip_notes: 制空0，索敌0。DD配三式水中探信儀+三式爆雷投射機+九五式爆雷等対潜装备。CVL配舰攻为主。若有先制対潜DD可一艘改配双炮打夜战提升S胜率。
  example:
  - ship: 白露改
    equips:
    - 三式水中探信儀
    - 三式爆雷投射機
    - 九五式爆雷
  - ship: 霞改
    equips:
    - 三式水中探信儀
    - 三式水中探信儀
    - 三式爆雷投射機
  - ship: 満潮改
    equips:
    - 三式水中探信儀
    - 三式爆雷投射機
    - 九五式爆雷
  - ship: 隼鷹改
    equips:
    - 九七式艦攻
    - 九七式艦攻
    - 九七式艦攻
    - 九九式艦爆
  tags:
  - P1
  - 萌新
  - 低速可
  special_attacks: []
- name: 泊地任务 P1 (2CVL+3DE)
  fleet:
    type: single
    slots:
    - ship_class:
      - CVL
      count: 2
      specific_ships:
      - 大鷹改二
      - 神鷹改二
      notes: 低速可，负责水上目标，带最强舰攻
    - ship_class:
      - DE
      count: 3
      specific_ships:
      - 佐渡改
      - 対馬改
      - 福江改
      notes: 负责水下目标，配对潜装备
  requirements:
    air_state: none
    air_power_min: 0
    routing_nodes:
    - C
    - E
    - G
  equip_notes: 制空约48~50，索敌25.17。一路无对空射击，CVL带最强舰攻。DE配四式水中聴音機+三式爆雷投射機+二式爆雷。
  example:
  - ship: 大鷹改二
    equips:
    - 天山一二型(村田隊)
    - 流星改(一航戦)
    - 天山一二型(友永隊)
    - Ju87C改二(KMX搭載機/熟練)
  - ship: 神鷹改二
    equips:
    - 流星改(一航戦/熟練)
    - 天山一二型(村田隊)
    - 彩雲
    - 彗星(江草隊)
  - ship: 佐渡改
    equips:
    - 四式水中聴音機
    - 三式爆雷投射機
    - 二式爆雷
  - ship: 対馬改
    equips:
    - 四式水中聴音機
    - 三式爆雷投射機
    - 二式爆雷
  - ship: 福江改
    equips:
    - 四式水中聴音機
    - 三式爆雷投射機
    - 二式爆雷
  tags:
  - P1
  - 任务
  - 低速可
  - 2CVL3DE
  special_attacks: []
- name: 萌新推图 P2 (B-C-D-I-M)
  fleet:
    type: single
    slots:
    - ship_class:
      - CV
      count: 1
      speed: 高速
      specific_ships:
      - 赤城改
      notes: 高速正规空母
    - ship_class:
      - BB
      - FBB
      count: 1
      speed: 高速
      specific_ships:
      - 金剛改
      notes: 高速战列
    - ship_class:
      - CLT
      count: 1
      speed: 高速
      specific_ships:
      - 北上改二
    - ship_class:
      - DD
      count: 2
      speed: 高速
      specific_ships:
      - 満潮改
      - 霞改
      notes: 对空CI
    - ship_class:
      - CVL
      count: 1
      speed: 高速
      specific_ships:
      - 瑞鳳改
      notes: 带彩雲避T字不利
  requirements:
    air_state: none
    air_power_min: 266
    enemy_air_power: 359
    los_formula: 4
    los_min: 69.0
    routing_nodes:
    - B
    - C
    - D
    - I
    - M
  equip_notes: 制空287~289。索敌14.97。司令部等级98以下或斩杀后需266空优，等级99以上斩杀前需359空优。全队高速。CVL带彩雲避T字不利。DD配10cm连装高角炮+94式高射装置对空CI。
  example:
  - ship: 赤城改
    equips:
    - 流星改
    - 試製烈風 後期型
    - 彗星一二型甲
    - 零式艦戦52型
  - ship: 金剛改
    equips:
    - 35.6cm連装砲
    - 41cm連装砲
    - 零式水上偵察機
    - 九一式徹甲弾
  - ship: 北上改二
    equips:
    - 15.5cm三連装副砲
    - 15.5cm三連装副砲
    - 甲標的 甲型
  - ship: 満潮改
    equips:
    - 10cm連装高角砲
    - 10cm連装高角砲
    - 91式高射装置
  - ship: 霞改
    equips:
    - 10cm連装高角砲
    - 10cm連装高角砲
    - 13号対空電探
  - ship: 瑞鳳改
    equips:
    - 試製烈風 後期型
    - 紫電改二
    - 零式艦戦53型(岩本隊)
    - 彩雲
  tags:
  - P2
  - 萌新
  - 高速
  - BB<=1
  - CV<=1
  special_attacks: []
