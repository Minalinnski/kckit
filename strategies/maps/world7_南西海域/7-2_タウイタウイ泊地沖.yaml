    - C
    - D
    - I
    - M
  equip_notes: 制空366~368，索敌39.78。斩杀后固定266空优。重点放在输出和道中通过率，对空CI意思一下即可。CLT北上改二配61cm五連装(酸素)魚雷×2+甲標的
    丙型魚雷CI。
