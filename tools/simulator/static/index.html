<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kckit Simulator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0a0e1a;
  --panel:    #141926;
  --border:   #1e2d4a;
  --accent:   #4a9eff;
  --accent2:  #22b8cf;
  --success:  #51cf66;
  --warn:     #f59f00;
  --error:    #ff6b6b;
  --text:     #c9d1d9;
  --dim:      #6e7f96;
}
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 13px;
  line-height: 1.4;
}
body { display: flex; flex-direction: column; }

/* ── HEADER ── */
#header {
  height: 40px;
  min-height: 40px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 14px;
  flex-shrink: 0;
  overflow: hidden;
}
#header-logo {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
  white-space: nowrap;
}
.hdot-group {
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  font-size: 12px;
  color: var(--dim);
}
.sdot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
}
.sdot.green { background: var(--success); box-shadow: 0 0 5px var(--success); }
.sdot.red   { background: var(--error);   box-shadow: 0 0 5px var(--error); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.sdot.green { animation: pulse 2.5s infinite; }

#header-screen {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  overflow: hidden;
}
#header-screen-label { color: var(--dim); white-space: nowrap; }
#header-screen-val   { font-weight: 700; color: var(--accent2); white-space: nowrap; }
#header-screen-src {
  font-size: 11px; color: var(--dim);
  background: #1e2d4a; border-radius: 3px; padding: 1px 5px;
  white-space: nowrap;
}

.hbtn {
  background: #1e2d4a; border: 1px solid var(--border);
  color: var(--text); border-radius: 4px; padding: 3px 9px;
  font-size: 12px; cursor: pointer; white-space: nowrap;
  transition: background .15s;
}
.hbtn:hover { background: #273a56; }
.hbtn:active { background: #1a2a40; }
.hbtn.active { background: #1e3a5f; border-color: var(--accent); color: var(--accent); }
.hbtn.recording { background: #2a1212; border-color: var(--error); color: var(--error); }
@keyframes rec-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.hbtn.recording { animation: rec-pulse 1s infinite; }

#overlay-screen-select {
  background: #1e2d4a; border: 1px solid var(--border);
  color: var(--text); border-radius: 4px; padding: 3px 6px;
  font-size: 12px; cursor: pointer;
}
#overlay-screen-select:focus { outline: none; border-color: var(--accent); }
#overlay-svg { opacity: 1; transition: opacity .2s; }
#overlay-svg.hidden { opacity: 0; pointer-events: none; }

/* ── MAIN COLUMNS ── */
#main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* ── LEFT: SCREENSHOT + OVERLAY ── */
#left-col {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-right: 1px solid var(--border);
  background: #060911;
  overflow: hidden;
}
#screenshot-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 889 / 533;
  max-height: 100%;
  overflow: hidden;
  background: #04080f;
}
@supports (aspect-ratio: 1) {
  #screenshot-wrap { max-width: calc(100vh * 889 / 533 - 40px); }
}
#screenshot-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: fill; display: block;
}
#screenshot-placeholder {
  display: none;
  position: absolute; inset: 0;
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: var(--dim);
}
#screenshot-placeholder .ph-icon { font-size: 48px; opacity: .4; }
#screenshot-placeholder .ph-text { font-size: 13px; }

/* ── PERCEPTION V2: view bar + recon canvas + state trail ── */
#view-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 4px 8px; border-bottom: 1px solid var(--border);
}
#view-modes { display: flex; gap: 4px; }
.vbtn {
  font-size: 11px; padding: 2px 10px; cursor: pointer;
  background: transparent; color: var(--dim);
  border: 1px solid var(--border); border-radius: 3px;
}
.vbtn.active { color: #fff; background: #1b2a3d; border-color: #3b5a7d; }
#classify-strip {
  font: 11px monospace; color: var(--dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#ov-legend { display: flex; gap: 8px; font-size: 10px; }
#ov-legend.hidden { display: none; }
.lg::before {
  content: ''; display: inline-block; width: 8px; height: 8px;
  margin-right: 3px; border-radius: 2px;
}
.lg-int  { color: #58c6ff; } .lg-int::before  { border: 1.5px solid #58c6ff; }
.lg-sem  { color: #3fb950; } .lg-sem::before  { border: 1.5px solid #3fb950; }
.lg-raw  { color: #8b949e; } .lg-raw::before  { border: 1px solid #8b949e; }
.lg-miss { color: #d29922; } .lg-miss::before { border: 1.5px solid #d29922; }
#state-strip {
  padding: 3px 8px; font-size: 11px; min-height: 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap; overflow: hidden;
}
.tr-node { color: var(--dim); }
.tr-node.cur { color: #3fb950; font-weight: 600; }
.tr-arrow { color: var(--border); margin: 0 4px; }
#recon-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: none;
}

/* ── OVERLAY SVG ── */
#overlay-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; overflow: visible;
}
.ov-rect   { fill: none; stroke-width: 2; rx: 3; }
.ov-circle { fill: none; stroke-width: 2; }
.ov-label  {
  font-size: 9px; font-family: monospace; font-weight: 600;
  dominant-baseline: hanging;
  paint-order: stroke fill; stroke-width: 3; stroke: rgba(0,0,0,0.8);
}
.ov-nav    { stroke: #4af; } .ov-nav    .ov-label { fill: #4af; }
.ov-action { stroke: #4f8; } .ov-action .ov-label { fill: #4f8; }
.ov-item   { stroke: #fa4; } .ov-item   .ov-label { fill: #fa4; }
.ov-tab    { stroke: #c8f; } .ov-tab    .ov-label { fill: #c8f; }
.ov-close  { stroke: #f66; stroke-dasharray: 6 3; } .ov-close .ov-label { fill: #f66; }

/* ── RIGHT COL ── */
#right-col {
  width: 40%; min-width: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

.sec-hdr {
  font-size: 11px; font-weight: 600; color: var(--dim);
  letter-spacing: .5px; text-transform: uppercase;
  padding: 5px 10px 4px;
  border-bottom: 1px solid var(--border);
  background: var(--panel); flex-shrink: 0;
}

/* ── RESOURCES ── */
#resources-panel {
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
#resources-grid {
  display: flex; flex-wrap: wrap; gap: 0; padding: 6px 8px;
}
.res-item { display: flex; align-items: center; gap: 5px; padding: 2px 8px 2px 0; white-space: nowrap; }
.res-icon  { font-size: 13px; line-height: 1; }
.res-label { font-size: 11px; color: var(--dim); }
.res-val   { font-size: 13px; font-weight: 600; color: var(--text); min-width: 38px; text-align: right; }
.res-val.bucket { color: var(--accent2); }
.res-hq { margin-left: auto; font-size: 12px; color: var(--dim); padding-left: 8px; }
.res-hq span { color: var(--accent); font-weight: 700; }

/* ── REPAIRS ── */
#repair-panel {
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
#repair-list { padding: 5px 10px 6px; display: flex; flex-direction: column; gap: 3px; }
.repair-row  { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.repair-dock { color: var(--dim); width: 60px; flex-shrink: 0; }
.repair-name { color: var(--text); flex: 1; }
.repair-name.done  { color: var(--success); }
.repair-timer      { font-family: monospace; font-size: 13px; color: var(--text); white-space: nowrap; }
.repair-timer.done { color: var(--success); }
.repair-empty      { color: var(--dim); font-style: italic; }

/* ── EXPEDITIONS ── */
#expd-panel {
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}
#expd-list { padding: 5px 10px 6px; display: flex; flex-direction: column; gap: 3px; }
.expd-row   { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.expd-fleet { color: var(--dim); width: 36px; flex-shrink: 0; }
.expd-name  { color: var(--accent2); font-weight: 600; flex: 1; }
.expd-timer { font-family: monospace; font-size: 13px; color: var(--text); white-space: nowrap; }
.expd-timer.done { color: var(--success); }
.expd-standby    { color: var(--dim); font-style: italic; }

/* ── QUESTS ── */
#quest-panel {
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: none;
  max-height: 55%;
  overflow: hidden;
  flex-direction: column;
}
#quest-panel.visible { display: flex; }
#quest-list-inner {
  overflow-y: auto;
  padding: 4px 0 6px;
  flex: 1;
}
#quest-list-inner::-webkit-scrollbar { width: 4px; }
#quest-list-inner::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 3px; }
.quest-row {
  display: flex; align-items: baseline; gap: 6px;
  padding: 2px 10px;
  font-size: 12px;
  line-height: 1.4;
}
.quest-row:hover { background: #0d1421; }
.quest-no    { color: var(--dim); font-size: 11px; font-family: monospace; flex-shrink: 0; width: 38px; }
.quest-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.quest-prog  { font-size: 11px; color: var(--accent); flex-shrink: 0; }
.quest-row.completable .quest-title { color: var(--success); }
.quest-row.completable .quest-no    { color: var(--success); }
.quest-divider {
  height: 1px; background: var(--border);
  margin: 3px 10px;
}
.quest-hdr-row {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px 2px;
  font-size: 11px; color: var(--dim);
}
.quest-badge {
  display: inline-block; border-radius: 3px;
  padding: 0 5px; font-size: 10px; font-weight: 600;
  background: #0f2a18; color: var(--success);
}
.quest-badge.active { background: #1a2740; color: var(--accent2); }

/* ── EVENT LOG ── */
#log-panel {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  background: var(--panel);
}
#log-list {
  flex: 1; overflow-y: auto;
  padding: 4px 0;
  font-family: monospace; font-size: 12px;
}
#log-list::-webkit-scrollbar { width: 5px; }
#log-list::-webkit-scrollbar-track { background: transparent; }
#log-list::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 3px; }
.log-entry { display: flex; align-items: flex-start; gap: 6px; padding: 2px 10px; }
.log-entry:hover { background: #0d1421; }
.log-ts   { color: var(--dim); flex-shrink: 0; font-size: 11px; padding-top: 1px; }
.log-body { flex: 1; min-width: 0; word-break: break-all; }
.log-screen-name { font-weight: 700; color: var(--accent2); }
.log-src-badge   { display: inline-block; font-size: 10px; padding: 0 4px; border-radius: 3px; background: #1e2d4a; color: var(--dim); margin-left: 4px; vertical-align: middle; }
.log-inject      { color: var(--accent); }
.log-error-entry { color: var(--error); }
.log-info        { color: var(--dim); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-logo">kckit</div>

  <div class="hdot-group">
    <span class="sdot" id="dot-poi"></span><span>poi</span>
  </div>
  <div class="hdot-group">
    <span class="sdot" id="dot-bridge"></span><span>bridge</span>
  </div>

  <div id="header-screen">
    <span id="header-screen-label">現在:</span>
    <span id="header-screen-val">—</span>
    <span id="header-screen-src" style="display:none"></span>
  </div>

  <button class="hbtn" id="btn-rec" title="录制行为数据 — click+API事件写入 temp/action_log.jsonl">⏺ Rec</button>
  <span id="rec-count" style="display:none; font-family:monospace; font-size:11px; color:var(--error); white-space:nowrap; min-width:24px; text-align:right"></span>
  <button class="hbtn" id="btn-overlay-toggle" title="手动标定层（screen_layout.yaml）">⬡ 手动</button>
  <button class="hbtn" id="btn-scene-overlay" title="感知层（场景树：可点击区/语义/缺图集）">⬡ 感知</button>
  <select id="overlay-screen-select" title="Force overlay for screen">
    <option value="">overlay: auto</option>
    <option value="port">母港</option>
    <option value="hensei">編成①主画面</option>
    <option value="hensei_ship_select">編成②艦選択</option>
    <option value="hensei_ship_confirm">編成③確認</option>
    <option value="supply">補給</option>
    <option value="equipment">改装①1-4艦隊</option>
    <option value="equipment_other">改装②他艦隊リスト</option>
    <option value="equipment_select">改装③装備選択</option>
    <option value="equipment_confirm">改装④変更確認</option>
    <option value="repair">入渠①主画面</option>
    <option value="repair_ship_select">入渠②艦選択</option>
    <option value="repair_ship_confirm">入渠③用桶確認</option>
    <option value="repair_confirm">入渠④最終確認</option>
    <option value="factory">工廠</option>
    <option value="quest_list">任務</option>
    <option value="sortie_type">出撃種別</option>
    <option value="sortie_world">海域選択</option>
    <option value="sortie_map">出撃海図</option>
    <option value="formation_select">陣形選択</option>
    <option value="practice">演習</option>
    <option value="expedition_select">遠征選択</option>
    <option value="battle">戦闘</option>
    <option value="battle_result">戦闘結果</option>
  </select>

  <button class="hbtn" id="btn-refresh">↺</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT: SCREENSHOT + OVERLAY -->
  <div id="left-col">
    <div id="view-bar">
      <div id="view-modes">
        <button class="vbtn active" data-mode="live">実拍</button>
        <button class="vbtn" data-mode="recon">重建</button>
      </div>
      <div id="ov-legend">
        <span class="lg lg-int">可点击区</span>
        <span class="lg lg-sem">已标语义</span>
        <span class="lg lg-raw">未标注</span>
        <span class="lg lg-miss">缺图集</span>
      </div>
      <div id="classify-strip">感知: —</div>
    </div>
    <div id="state-strip"></div>
    <div id="screenshot-wrap">
      <img id="screenshot-img" src="" alt="screenshot">
      <div id="screenshot-placeholder">
        <div class="ph-icon">📷</div>
        <div class="ph-text">No screenshot</div>
      </div>
      <canvas id="recon-canvas" width="1200" height="720"></canvas>
      <svg id="overlay-svg" viewBox="0 0 889 533" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <!-- RIGHT COL -->
  <div id="right-col">

    <!-- RESOURCES -->
    <div id="resources-panel">
      <div class="sec-hdr">Resources</div>
      <div id="resources-grid">
        <div class="res-item">
          <span class="res-icon">⛽</span><span class="res-label">燃料</span>
          <span class="res-val" id="res-fuel">—</span>
        </div>
        <div class="res-item">
          <span class="res-icon">💣</span><span class="res-label">弾薬</span>
          <span class="res-val" id="res-ammo">—</span>
        </div>
        <div class="res-item">
          <span class="res-icon">⚙️</span><span class="res-label">鋼材</span>
          <span class="res-val" id="res-steel">—</span>
        </div>
        <div class="res-item">
          <span class="res-icon">✈️</span><span class="res-label">ボーキ</span>
          <span class="res-val" id="res-bauxite">—</span>
        </div>
        <div class="res-item">
          <span class="res-icon">🪣</span><span class="res-label">バケツ</span>
          <span class="res-val bucket" id="res-bucket">—</span>
        </div>
        <div class="res-hq">Lv.<span id="res-hq">—</span></div>
      </div>
    </div>

    <!-- REPAIR DOCKS -->
    <div id="repair-panel">
      <div class="sec-hdr">入渠</div>
      <div id="repair-list">
        <div class="repair-row"><span class="repair-empty">—</span></div>
      </div>
    </div>

    <!-- EXPEDITIONS -->
    <div id="expd-panel">
      <div class="sec-hdr">遠征</div>
      <div id="expd-list">
        <div class="expd-row"><span class="expd-standby">—</span></div>
      </div>
    </div>

    <!-- QUESTS (visible when screen = quest_list) -->
    <div id="quest-panel">
      <div class="sec-hdr">任務 <span id="quest-hdr-counts"></span></div>
      <div id="quest-list-inner"></div>
    </div>

    <!-- EVENT LOG -->
    <div id="log-panel">
      <div class="sec-hdr">Log</div>
      <div id="log-list"></div>
    </div>

  </div><!-- /right-col -->
</div><!-- /main -->

<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────
const SCREEN_JP = {
  port:               '母港',
  hensei:             '編成',
  supply:             '補給',
  repair:             '入渠',
  factory:            '工廠',
  equipment:          '改装',
  equipment_other:    '改装(他)',
  quest_list:         '任務',
  sortie_world:       '出撃海域',
  sortie_type:        '出撃種別',
  formation_select:   '陣形選択',
  practice:           '演習',
  expedition_select:  '遠征選択',
  expedition_result:  '遠征結果',
  battle:             '戦闘中',
  night_battle:       '夜戦',
  battle_result:      '戦闘結果',
};

const LOG_MAX = 80;

// ── State ──────────────────────────────────────────────────────────────────
let state = {
  poiConnected:   null,    // null = never received
  bridgeConnected: false,
  currentScreen:  null,
  currentSource:  null,
  resources:      null,
  hqLevel:        null,
  fleets:         {},
  repairs:        {},
  screenshotOk:   false,
};

// ── DOM refs ───────────────────────────────────────────────────────────────
const dotPoi      = document.getElementById('dot-poi');
const dotBridge   = document.getElementById('dot-bridge');
const hScreenVal  = document.getElementById('header-screen-val');
const hScreenSrc  = document.getElementById('header-screen-src');
const ssImg         = document.getElementById('screenshot-img');
const ssPlaceholder = document.getElementById('screenshot-placeholder');
const overlaySvg    = document.getElementById('overlay-svg');
const resFuel     = document.getElementById('res-fuel');
const resAmmo     = document.getElementById('res-ammo');
const resSteel    = document.getElementById('res-steel');
const resBauxite  = document.getElementById('res-bauxite');
const resBucket   = document.getElementById('res-bucket');
const resHq       = document.getElementById('res-hq');
const repairList    = document.getElementById('repair-list');
const expdList      = document.getElementById('expd-list');
const questPanel    = document.getElementById('quest-panel');
const questListEl   = document.getElementById('quest-list-inner');
const questHdrCnt   = document.getElementById('quest-hdr-counts');
const logList       = document.getElementById('log-list');

// ── Overlay ────────────────────────────────────────────────────────────────
let _layoutCache = null;
let _overlayScreen = null;

async function loadLayout() {
  if (_layoutCache) return _layoutCache;
  try {
    const r = await fetch('/api/layout?t=' + Date.now());
    _layoutCache = await r.json();
  } catch { _layoutCache = {}; }
  return _layoutCache;
}

function ovClass(key) {
  if (/close_area|dismiss/.test(key))  return 'ov-close';
  if (/nav|back_port|sortie_btn|exercise_btn|expedition_btn/.test(key)) return 'ov-nav';
  if (/tab/.test(key))                 return 'ov-tab';
  if (/release|bulk_release/.test(key)) return 'ov-action';
  if (/item|equip_slot|ship|dock|enemy|quest|exp_item|world|map_|slot_ex$/.test(key)) return 'ov-item';
  return 'ov-action';
}

async function renderOverlay(screenName) {
  if (!overlaySvg) return;
  const target = _overlayForced || screenName;
  if (target !== null && target === _overlayScreen) return;
  _overlayScreen = target;
  overlaySvg.innerHTML = '';

  const layout = await loadLayout();
  const screens = layout.screens || layout;

  const NO_COMMON = new Set([
    'repair_confirm', 'expedition_result',
    'battle', 'night_battle', 'battle_result', 'night_battle_select',
    'sortie_routing', 'formation_select', 'post_battle',
  ]);
  const HAS_LIST_DISMISS = new Set([
    'repair_ship_select', 'hensei_ship_select', 'equipment_select',
  ]);
  const HAS_CONFIRM_DISMISS = new Set([
    'repair_ship_confirm', 'hensei_ship_confirm', 'equipment_confirm',
  ]);
  const NO_LEFT_NAV = new Set([
    'port', 'quest_list', 'expedition_result', 'repair_confirm',
    'battle', 'night_battle', 'battle_result', 'night_battle_select',
    'sortie_routing', 'formation_select', 'post_battle',
    null,
  ]);

  const elements = {};
  if (!NO_COMMON.has(target) && layout.common?.elements)
    Object.assign(elements, layout.common.elements);
  if (!NO_LEFT_NAV.has(target) && layout.left_nav?.elements)
    Object.assign(elements, layout.left_nav.elements);
  if (target && screens[target]?.elements)
    Object.assign(elements, screens[target].elements);
  if (HAS_LIST_DISMISS.has(target) && layout.popups?.list_dismiss?.elements)
    Object.assign(elements, layout.popups.list_dismiss.elements);
  if (HAS_CONFIRM_DISMISS.has(target) && layout.popups?.confirm_dismiss?.elements)
    Object.assign(elements, layout.popups.confirm_dismiss.elements);
  if (!Object.keys(elements).length) return;

  const W = 889, H = 533;
  for (const [key, el] of Object.entries(elements)) {
    const cx = el.x * W, cy = el.y * H;
    const hw = (el.w * W) / 2, hh = (el.h * H) / 2;
    const cls = ovClass(key);
    const label = el.label || key;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', cls);

    if (el.shape === 'circle') {
      const r = Math.min(hw, hh);
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r);
      c.setAttribute('class', 'ov-circle');
      g.appendChild(c);
    } else {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', cx - hw); rect.setAttribute('y', cy - hh);
      rect.setAttribute('width', hw * 2); rect.setAttribute('height', hh * 2);
      rect.setAttribute('class', 'ov-rect');
      g.appendChild(rect);
    }

    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', cx - hw + 2);
    txt.setAttribute('y', cy - hh + 1);
    txt.setAttribute('class', 'ov-label');
    txt.textContent = label;
    g.appendChild(txt);

    overlaySvg.appendChild(g);
  }
}

// ── Timer helper ───────────────────────────────────────────────────────────
function fmtTimer(ts) {
  const diff = ts - Date.now();
  if (diff <= 0) return null;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return [h, m, s].map(x => String(x).padStart(2, '0')).join(':');
}

let _repairRows = [];

function renderRepairs(repairs) {
  _repairRows = [1, 2, 3, 4].map(i => {
    const dock = repairs && (repairs[String(i)] || repairs[i]);
    if (!dock || dock.state <= 0) return { id: i, empty: true };
    return { id: i, ship_name: dock.ship_name || '?', complete_time: dock.complete_time };

    return `<div class="repair-row">
      <span class="repair-dock">第${r.id}ドック</span>
      <span class="repair-name${done ? ' done' : ''}">${esc(r.ship_name)}</span>
      <span class="repair-timer${done ? ' done' : ''}">${done ? '完了' : timer}</span>

    rows.push(`<div class="quest-hdr-row">✅ 受取可能 (${completable.length})</div>`);

      rows.push(`<div class="quest-row completable">
        <span class="quest-no">#${q.no}</span>
        <span class="quest-title" title="${esc(q.title)}">${esc(q.title)}</span>
      </div>`);

    if (completable.length) rows.push('<div class="quest-divider"></div>');

// ── Perception v2: scene-tree reconstruction ────────────────────────────────
// The plugin broadcasts the live PIXI scene tree (texture frame + bounds +
// text). We redraw it from harvested atlases (/api/atlas) — the "digital
// twin" view — and outline what the system understands:
//   green = semantically labeled  /  gray = atlas frame not yet labeled
//   orange = atlas not harvested  /  text nodes drawn literally
const reconCanvas  = document.getElementById('recon-canvas');
const reconCtx     = reconCanvas.getContext('2d');
const classifyStrip = document.getElementById('classify-strip');
const stateStrip   = document.getElementById('state-strip');

let viewMode = 'live';          // live | recon
let lastTree = null;
let frameSemantic = new Map();  // frame name → "screen.element"
let frameShape = new Map();     // frame name → 'circle' (from semantics shape:)
const atlasCache = new Map();   // atlas → {img, frames} | 'loading' | 'missing'

fetch('/api/semantics').then(r => r.json()).then(s => {
  for (const [scr, elems] of Object.entries(s || {})) {
    for (const [el, def] of Object.entries(elems || {})) {
      for (const f of (def.frames || [])) {
        frameSemantic.set(f, `${scr}.${el}`);
        if (def.shape) frameShape.set(f, def.shape);
      }
    }
  }
  scheduleRecon();
}).catch(() => {});

function atlasOf(frame) {
  // 'sally_top_4' → 'sally_top'; raw URLs / filenames → null
  if (!frame || frame.startsWith('@') || frame.includes('/') || frame.includes('.')) return null;
  const i = frame.lastIndexOf('_');
  if (i < 0) return null;
  return /^\d+$/.test(frame.slice(i + 1)) ? frame.slice(0, i) : null;
}

function ensureAtlas(name) {
  const c = atlasCache.get(name);
  if (c) return (c === 'loading' || c === 'missing') ? null : c;
  atlasCache.set(name, 'loading');
  Promise.all([
    fetch(`/api/atlas/${name}.json`).then(r => { if (!r.ok) throw 0; return r.json(); }),
    new Promise((res, rej) => {
      const im = new Image();
      im.onload = () => res(im); im.onerror = rej;
      im.src = `/api/atlas/${name}.png`;
    }),
  ]).then(([meta, img]) => {
    atlasCache.set(name, { img, frames: meta.frames || {} });
    scheduleRecon();
  }).catch(() => atlasCache.set(name, 'missing'));
  return null;
}

const rawImageCache = new Map();  // kcs2 path → Image | 'loading' | 'missing'
function ensureRawImage(path) {   // path like 'kcs2/resources/ship/full/x.png'
  const c = rawImageCache.get(path);
  if (c) return (c === 'loading' || c === 'missing') ? null : c;
  rawImageCache.set(path, 'loading');
  const im = new Image();
  im.onload = () => { rawImageCache.set(path, im); scheduleRecon(); };
  im.onerror = () => rawImageCache.set(path, 'missing');
  im.src = '/api/kcres/' + path;
  return null;
}

let _reconPending = false;
function scheduleRecon() {
  if (_reconPending) return;
  _reconPending = true;
  requestAnimationFrame(() => { _reconPending = false; renderScene(); });
}

function _outline(ctx, n, color, label) {
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  if (n.t && frameShape.get(n.t) === 'circle') {
    ctx.beginPath();
    ctx.ellipse(n.x + n.w / 2, n.y + n.h / 2, n.w / 2, n.h / 2, 0, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    ctx.strokeRect(n.x, n.y, n.w, n.h);
  }
  if (label) {
    ctx.font = '12px monospace'; ctx.textBaseline = 'top';
    ctx.fillStyle = color;
    ctx.fillText(label, n.x + 2, n.y + 2);
  }
}

// The recon canvas paints two independent layers, both driven by the same
// scene tree: sprites (重建 mode replaces the screenshot) and the perception
// overlay (⬡ toggle, works over both 実拍 and 重建).
// Overlay shows actionable knowledge only:
//   green  = semantically labeled element (click target)
//   gray   = atlas frame not yet labeled (faint — likely decoration)
//   orange = atlas not harvested (work item, labeled with frame name)
// Text nodes and raw resources get NO overlay box: their data already
// arrives via the poi API; boxing them is noise.
// PIXI masks: a node's m:[x,y,w,h] clips itself and its whole subtree.
// Nodes arrive in DFS order, so a stack of cumulative clip rects (keyed by
// tree path) reproduces the in-game clipping — without this, scroll lists
// and sliding banners (e.g. 編成 carousels) paint every off-window item.
function _intersect(a, b) {
  if (!a) return b;
  if (!b) return a;
  const x = Math.max(a[0], b[0]), y = Math.max(a[1], b[1]);
  const r = Math.min(a[0] + a[2], b[0] + b[2]), bo = Math.min(a[1] + a[3], b[1] + b[3]);
  return [x, y, Math.max(0, r - x), Math.max(0, bo - y)];
}
function _outsideClip(n, clip) {
  return clip && (n.x >= clip[0] + clip[2] || n.y >= clip[1] + clip[3] ||
                  n.x + n.w <= clip[0] || n.y + n.h <= clip[1]);
}

function renderScene() {
  if (!lastTree) return;
  const sprites = viewMode === 'recon';
  const overlay = (typeof _sceneOvVisible !== 'undefined') && _sceneOvVisible;
  if (!sprites && !overlay) { reconCtx.clearRect(0, 0, reconCanvas.width, reconCanvas.height); return; }
  const { rw, rh, nodes } = lastTree;
  if (reconCanvas.width !== rw) { reconCanvas.width = rw; reconCanvas.height = rh; }
  const ctx = reconCtx;
  ctx.clearRect(0, 0, rw, rh);
  if (sprites) { ctx.fillStyle = '#0a1420'; ctx.fillRect(0, 0, rw, rh); }

  const interactives = [];   // drawn last, on top of everything
  const clipStack = [];      // {path, rect: cumulative intersection}

  for (const n of nodes) {
    while (clipStack.length &&
           !n.p.startsWith(clipStack[clipStack.length - 1].path + '.')) {
      clipStack.pop();
    }
    if (n.m) {
      const parent = clipStack.length ? clipStack[clipStack.length - 1].rect : null;
      clipStack.push({ path: n.p, rect: _intersect(parent, n.m) });
    }
    const clip = clipStack.length ? clipStack[clipStack.length - 1].rect : null;
    if (_outsideClip(n, clip)) continue;          // fully hidden in-game

    if (n.i) interactives.push(n);
    const needsClip = clip && (n.x < clip[0] || n.y < clip[1] ||
                               n.x + n.w > clip[0] + clip[2] || n.y + n.h > clip[1] + clip[3]);
    if (needsClip) {
      ctx.save(); ctx.beginPath();
      ctx.rect(clip[0], clip[1], clip[2], clip[3]); ctx.clip();
    }
    _drawNode(ctx, n, sprites, overlay);
    if (needsClip) ctx.restore();
  }

  // Interaction layer on top: the game's OWN click regions (interactive
  // nodes, usually alpha-0 sprites). These are ground truth for clicking —
  // labeled with semantic name if known, else texture frame name.
  if (overlay) {
    for (const n of interactives) {
      const sem = n.t ? frameSemantic.get(n.t) : null;
      ctx.fillStyle = 'rgba(88,198,255,0.10)';
      ctx.fillRect(n.x, n.y, n.w, n.h);
      _outline(ctx, n, '#58c6ff', sem ? sem.split('.')[1] : (n.t || ''));
    }
  }
}

function _drawNode(ctx, n, sprites, overlay) {
  {
    if (n.txt) {
      if (sprites) {
        // PIXI text style travels with the node (fc=fill, sc=stroke, fs=size);
        // the stroke is what keeps light text readable on light backgrounds
        const px = (n.fs && n.fs <= n.h * 1.3) ? n.fs
                 : Math.max(10, Math.round(n.h * 0.72));
        ctx.font = `${px}px sans-serif`;
        ctx.textBaseline = 'top';
        if (n.sc) {
          ctx.strokeStyle = n.sc;
          ctx.lineWidth = Math.max(2, Math.round(px / 7));
          ctx.lineJoin = 'round';
          try { ctx.strokeText(n.txt, n.x, n.y); } catch {}
        }
        ctx.fillStyle = n.fc || '#e8e8e8';
        ctx.fillText(n.txt, n.x, n.y);
      }
      return;
    }
    if (n.a === 0) return;   // invisible click zone — overlay pass only
    const t = n.t;
    if (!t) return;
    const atlasName = atlasOf(t);
    if (!atlasName) {
      if (sprites) {
        // raw resource (ship art, map bg): load through the simulator's
        // /api/kcres proxy; placeholder until it arrives
        const img = t.startsWith('@/kcs2/') ? ensureRawImage(t.slice(2)) : null;
        if (img) {
          try {
            if (n.v) {
              const [tlx, tly, trx, try_, , , blx, bly] = n.v;
              ctx.setTransform(
                (trx - tlx) / img.width, (try_ - tly) / img.width,
                (blx - tlx) / img.height, (bly - tly) / img.height,
                tlx, tly);
              ctx.drawImage(img, 0, 0);
              ctx.setTransform(1, 0, 0, 1, 0, 0);
            } else {
              ctx.drawImage(img, n.x, n.y, n.w, n.h);
            }
          } catch {}
        } else {
          ctx.fillStyle = 'rgba(30,45,60,0.45)';
          ctx.fillRect(n.x, n.y, n.w, n.h);
        }
      }
      return;
    }
    const atlas = ensureAtlas(atlasName);
    const sem = frameSemantic.get(t);
    if (sprites) {
      if (atlas && atlas.frames[t]) {
        const f = atlas.frames[t].frame;
        try {
          if (n.v) {
            // exact quad placement: map the texture rect onto the sprite's
            // world-space corners (TL,TR,BR,BL) — correct for rotation/scale,
            // unlike stretching into the axis-aligned bounds box
            const [tlx, tly, trx, try_, , , blx, bly] = n.v;
            ctx.setTransform(
              (trx - tlx) / f.w, (try_ - tly) / f.w,
              (blx - tlx) / f.h, (bly - tly) / f.h,
              tlx, tly);
            ctx.drawImage(atlas.img, f.x, f.y, f.w, f.h, 0, 0, f.w, f.h);
            ctx.setTransform(1, 0, 0, 1, 0, 0);
          } else {
            ctx.drawImage(atlas.img, f.x, f.y, f.w, f.h, n.x, n.y, n.w, n.h);
          }
        } catch {}
      } else if (!atlas) {
        ctx.fillStyle = 'rgba(200,120,20,0.25)';     // atlas not harvested
        ctx.fillRect(n.x, n.y, n.w, n.h);
      }
    }
    if (overlay && !n.i) {
      if (sem) {
        _outline(ctx, n, '#3fb950', sem.split('.')[1]);
      } else if (!atlas) {
        if (n.w >= 14 && n.h >= 12) _outline(ctx, n, '#d29922', t);
      } else if (n.w >= 18 && n.h >= 14) {
        // unlabeled atlas sprite — faint thin box, no label (decoration noise)
        ctx.strokeStyle = 'rgba(139,148,158,0.35)';
        ctx.lineWidth = 1;
        ctx.strokeRect(n.x, n.y, n.w, n.h);
      }
    }
  }
}

function updateReconVisibility() {
  const overlay = (typeof _sceneOvVisible !== 'undefined') && _sceneOvVisible;
  reconCanvas.style.display = (viewMode === 'recon' || overlay) ? 'block' : 'none';
  const legend = document.getElementById('ov-legend');
  if (legend) legend.classList.toggle('hidden', !overlay);
}

function updateClassify(c) {
  if (!c) return;
  const pref = Object.entries(c.prefixes || {})
    .filter(([k]) => !k.startsWith('text'))
    .sort((a, b) => b[1] - a[1]).slice(0, 3)
    .map(([k, v]) => `${k}×${v}`).join(' ');
  const pct = Math.round((c.confidence || 0) * 100);
  classifyStrip.style.color = '';   // clear health-alert red once data flows again
  classifyStrip.textContent = `感知: ${c.screen || '?'} (${pct}%)  ${pref}`;
}

const _trail = [];
function pushTrail(screen, source) {
  if (!screen) return;
  if (_trail.length && _trail[_trail.length - 1].screen === screen) return;
  _trail.push({ screen, source });
  while (_trail.length > 8) _trail.shift();
  stateStrip.innerHTML = _trail.map((t, i) =>
    `${i ? '<span class="tr-arrow">→</span>' : ''}` +
    `<span class="tr-node${i === _trail.length - 1 ? ' cur' : ''}"` +
    ` title="${esc(t.source || '')}">${esc(SCREEN_JP[t.screen] || t.screen)}</span>`
  ).join('');
}

async function pullSceneTree() {
  try {
    const r = await fetch('/api/scene_tree', { method: 'POST' });
    const d = await r.json();
    if (d.payload) { lastTree = d.payload; updateClassify(d.classify); scheduleRecon(); }
  } catch {}
}

function setViewMode(m) {
  viewMode = m;
  document.querySelectorAll('.vbtn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === m));
  ssImg.style.opacity = (m === 'recon') ? '0' : '1';
  updateReconVisibility();
  // Always repaint: the canvas may still hold the other mode's pixels
  // (e.g. recon sprites lingering over the screenshot after切回実拍)
  if (!lastTree) pullSceneTree();
  scheduleRecon();
  if (m === 'live') refreshScreenshot();
}
document.querySelectorAll('.vbtn').forEach(b =>
  b.addEventListener('click', () => setViewMode(b.dataset.mode)));

// ── Event log ──────────────────────────────────────────────────────────────
let logEntries = [];

function ts() { return new Date().toTimeString().slice(0, 8); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendLog(html) {
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="log-ts">${ts()}</span><span class="log-body">${html}</span>`;
  logList.appendChild(div);
  logEntries.push(div);
  while (logEntries.length > LOG_MAX) logEntries.shift().remove();
  logList.scrollTop = logList.scrollHeight;
}

function logScreenChange(screen, source, api) {
  const jp     = screen ? (SCREEN_JP[screen] || screen) : '—';
  const apiStr = api ? ` <span style="color:var(--dim);font-size:11px">${esc(api)}</span>` : '';
  appendLog(
    `<span class="log-screen-name">[${jp}]</span>` +
    `<span class="log-src-badge">${esc(source || '')}</span>` + apiStr
  );
}

function logInfo(text)   { appendLog(`<span class="log-info">${esc(text)}</span>`); }
function logErr(text)    { appendLog(`<span class="log-error-entry">${esc(text)}</span>`); }
function logInject(text) { appendLog(`<span class="log-inject">${esc(text)}</span>`); }

// ── State application ──────────────────────────────────────────────────────
const API_TO_SCREEN = {
  'api_port/port':                'port',
  'api_get_member/deck':          'hensei',
  'api_get_member/ship2':         'supply',
  'api_get_member/ndock':         'repair',
  'api_get_member/kdock':         'factory',
  'api_get_member/questlist':     'quest_list',
  'api_get_member/mapinfo':       'sortie_world',
  'api_get_member/practice':      'practice',
  'api_get_member/mission':       'expedition_select',
  'api_req_sortie/battle':        'battle',
  'api_req_sortie/battleresult':  'battle_result',
  'api_req_battle_midnight/battle': 'night_battle',
  'api_req_combined_battle/battle': 'battle',
  'api_req_combined_battle/battleresult': 'battle_result',
  'api_req_mission/result':       'expedition_result',
  'api_req_hokyu/charge':         'supply',
  'api_req_nyukyo/start':         'repair',
};

function applyState(d) {
  if (d.resources)             updateResources(d.resources, d.hq_level);
  if (d.repairs !== undefined) renderRepairs(d.repairs || {});
  if (d.fleets)                renderExpd(d.fleets);
  if (d.quests)                renderQuests(d.quests);

  if (d.hq_level != null) state.hqLevel = d.hq_level;
  if (d.resources)         state.resources = d.resources;
  if (d.fleets)            state.fleets = d.fleets;

  // Infer screen from snapshot's last_event (initial load only)
  if (!state.currentScreen && d.last_event) {
    const short    = d.last_event.replace('/kcsapi/', '');
    const inferred = API_TO_SCREEN[short] || null;
    if (inferred) {
      state.currentScreen = inferred;
      state.currentSource = 'snapshot';
      updateHeaderScreen(inferred, 'snapshot');
      renderOverlay(inferred);
    }
  }
}

async function fetchState() {
  try {
    const r = await fetch('/api/state');
    if (!r.ok) return;
    applyState(await r.json());
  } catch {}
}

// ── Overlay controls ───────────────────────────────────────────────────────
let _overlayVisible = true;
let _overlayForced  = '';

const btnOverlay    = document.getElementById('btn-overlay-toggle');
const overlaySelect = document.getElementById('overlay-screen-select');

btnOverlay.classList.add('active');

// ⬡ 手动 — legacy hand-calibrated layout (screen_layout.yaml → SVG)
btnOverlay.addEventListener('click', () => {
  _overlayVisible = !_overlayVisible;
  overlaySvg.classList.toggle('hidden', !_overlayVisible);
  btnOverlay.classList.toggle('active', _overlayVisible);
});

// ⬡ 感知 — perception overlay (scene-tree click zones / semantics / gaps)
let _sceneOvVisible = true;
const btnSceneOv = document.getElementById('btn-scene-overlay');
btnSceneOv.classList.add('active');
btnSceneOv.addEventListener('click', () => {
  _sceneOvVisible = !_sceneOvVisible;
  btnSceneOv.classList.toggle('active', _sceneOvVisible);
  updateReconVisibility();
  scheduleRecon();
});
updateReconVisibility();
if (!lastTree) pullSceneTree();

overlaySelect.addEventListener('change', () => {
  _overlayForced = overlaySelect.value;
  _overlayScreen = null;
  renderOverlay(_overlayForced || state.currentScreen);
});

document.getElementById('btn-refresh').addEventListener('click', () => {
  _layoutCache   = null;
  _overlayScreen = null;
  refreshScreenshot();
  renderOverlay(state.currentScreen);
  logInfo('↺ refreshed');
});

// ── Recording ─────────────────────────────────────────────────────────────
let _recording = false;
let _recPollTimer = null;

const btnRec   = document.getElementById('btn-rec');
const recCount = document.getElementById('rec-count');

btnRec.addEventListener('click', async () => {
  if (!_recording) {
    try {
      const r = await fetch('/api/recording/start', {method: 'POST'});
      const d = await r.json();
      if (!d.recording) return;
    } catch (e) { logErr('recording start failed: ' + e); return; }
    _recording = true;
    btnRec.classList.add('recording');
    btnRec.textContent = '⏹ Rec';
    recCount.style.display = '';
    recCount.textContent = '0';
    _recPollTimer = setInterval(async () => {
      try {
        const r = await fetch('/api/recording/status');
        const d = await r.json();
        recCount.textContent = `${d.clicks ?? 0}c ${d.apis ?? 0}a ${d.screens ?? 0}s`;
      } catch {}
    }, 2000);
    logInfo('⏺ recording started — play normally');
  } else {
    clearInterval(_recPollTimer);
    _recPollTimer = null;
    try {
      const r = await fetch('/api/recording/stop', {method: 'POST'});
      const d = await r.json();
      logInfo(`⏹ recording stopped — ${d.entries} entries → ${d.path}`);
    } catch (e) { logErr('recording stop failed: ' + e); }
    _recording = false;
    btnRec.classList.remove('recording');
    btnRec.textContent = '⏺ Rec';
    recCount.style.display = 'none';
  }
});

// ── WebSocket ──────────────────────────────────────────────────────────────
let ws = null;
let wsRetryDelay  = 1000;
let wsEverConnected = false;

function connectWs() {
  ws = new WebSocket('ws://localhost:8765/ws');

  ws.addEventListener('open', () => {
    state.bridgeConnected = true;
    wsRetryDelay = 1000;
    updateDots();
    if (wsEverConnected) logInfo('bridge reconnected');
    wsEverConnected = true;
    fetchState();
    refreshScreenshot();
  });

  ws.addEventListener('close', () => {
    state.bridgeConnected = false;
    updateDots();
    if (wsEverConnected) logErr('bridge lost — retrying…');
    wsEverConnected = false;
    setTimeout(connectWs, wsRetryDelay);
    wsRetryDelay = Math.min(wsRetryDelay * 2, 15000);
  });

  ws.addEventListener('error', () => {});

  ws.addEventListener('message', evt => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }
    handleWsMessage(msg);
  });
}

function handleWsMessage(msg) {
  switch (msg.type) {

    // Real-time state update (resources / repairs / expeditions)
    case 'state_update':
      applyState(msg);
      break;

    // Legacy full state (from REST or old path)
    case 'state':
      if (msg.payload) applyState(msg.payload);
      break;

    // poi connection status
    case 'poi_status': {
      const prev = state.poiConnected;
      state.poiConnected = msg.connected;
      updateDots();
      if (msg.connected && prev !== true) {
        logInfo('poi connected');
        refreshScreenshot();
      } else if (!msg.connected && prev === true) {
        logErr('poi disconnected');
      }
      break;
    }

    // Screen changed via API event or nav watcher
    case 'screen_change': {
      const { screen, source, api } = msg;
      state.currentScreen = screen;
      state.currentSource  = source;
      updateHeaderScreen(screen, source);
      logScreenChange(screen, source, api);
      pushTrail(screen, source);
      renderOverlay(screen);
      updatePanelVisibility(screen);
      if (viewMode !== 'recon') scheduleScreenshot(400);
      break;
    }

    // PIXI canvas changed → refresh screenshot (silent; skip in recon mode)
    case 'pixi_stage':
    case 'screenshot_needed':
      if (viewMode !== 'recon') scheduleScreenshot(400);
      break;

    // Plugin health alert (e.g. @electron/remote registry overflow)
    case 'health': {
      if (!msg.ok) {
        logErr(`⚠️ 插件健康告警: ${msg.reason} — ${msg.hint || ''}`);
        classifyStrip.textContent = '⚠️ remote 通道故障 — 请完全退出并重启 poi（Cmd+Q）';
        classifyStrip.style.color = '#f85149';
      }
      break;
    }

    // Live scene tree (perception v2) → reconstruction + classification
    case 'scene_tree':
      if (msg.payload) {
        lastTree = msg.payload;
        updateClassify(msg.classify);
        scheduleRecon();
      }
      break;

    // Spy injection result — only log manual injections
    case 'spy_result': {
      if (!msg.auto) {
        const p = msg.payload || {};
        logInject(p.ok
          ? `spy ok — screen=${p.initialScreen || '?'}`
          : `spy failed: ${JSON.stringify(p).slice(0, 80)}`
        );
        if (p.ok) refreshScreenshot();
      }
      break;
    }

    // Click hook injection result — tells us if canvas click capture is working
    case 'click_hook_result': {
      const p = msg.payload || {};
      if (p.error) {
        logErr(`click hook FAILED: ${p.error}`);
      } else if (p.err) {
        logErr(`click hook: ${p.err} (canvas not found?)`);
      } else if (p.already) {
        logInfo(`click hook: already active`);
      } else if (p.ok) {
        logInject(`click hook ok — canvas ${p.cvWidth}×${p.cvHeight}`);
      }
      break;
    }

    // Everything else: ignore
    default:
      break;
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
updateDots();
updateHeaderScreen(null, null);
updateResources(null, null);
renderRepairs({});
renderExpd({});
updatePanelVisibility(null);
setInterval(tickRepairs, 1000);
setInterval(tickExpd,    1000);
// Screenshot is event-driven now (screenshot_needed / screen_change);
// keep only a slow safety-net poll.
setInterval(() => { if (viewMode !== 'recon') refreshScreenshot(); }, 30000);
refreshScreenshot();
fetchState();
connectWs();
pullSceneTree();
</script>
