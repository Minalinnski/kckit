# KanColle screen layout — coordinates are fractions of screenshot size (889×533).
# All (x,y) = center of element, (w,h) = full bounding box size.
# shape: circle → hit-test uses circular radius = min(w,h)/2; default = rect.
#
# Calibration sources:
#   - Figma BZMSy7NPXAaEGVR6ToqQUG node 1:13 (2026-06-04) — precise ellipses
#     Canvas frame in Figma: offset (111,141), size 889×533.
#     Conversion: frac = (figma_px_center - canvas_offset) / canvas_size
#   - poi_nav: from annotated screenshots (2026-05-24), user confirmed OK
#   - APPROX = not yet Figma-confirmed
#
# ── COMMON — present on ALL game screens ──────────────────────────────────────
# Resource bar (top info strip) is DISPLAY ONLY, not a click target — excluded.

common:
  elements:
    # poi React nav bar — calibrated from actual screenshots (2026-05-24), user-confirmed correct
    # Equal spacing ~0.100 between centers; w=0.097, h=0.073 per button
    poi_nav_1:       {x: 0.198, y: 0.101, w: 0.097, h: 0.073, label: poi_nav1}
    poi_nav_2:       {x: 0.298, y: 0.101, w: 0.097, h: 0.073, label: poi_nav2}
    poi_nav_3:       {x: 0.399, y: 0.101, w: 0.097, h: 0.073, label: poi_nav3}
    poi_nav_4:       {x: 0.498, y: 0.101, w: 0.097, h: 0.073, label: poi_nav4}
    poi_nav_5:       {x: 0.601, y: 0.101, w: 0.097, h: 0.073, label: poi_nav5}
    poi_nav_6:       {x: 0.701, y: 0.101, w: 0.097, h: 0.073, label: poi_nav6}
    # 母港 crest — top-left teal circle, Figma Ellipse 7 (4:24)
    back_port:       {x: 0.052, y: 0.081, w: 0.151, h: 0.251, shape: circle, label: 母港}

# ── Left sidebar ─────────────────────────────────────────────────────────────
# Appears in: 編成/補給/改装/入渠/工廠/出撃 (all sub-screens; NOT port, NOT battle)
# NOT the same as back_port (top-left teal circle) — different element.
# Calibrated 2026-06-04 from Figma 10:2, canvas "入渠" (offset 77,96).
#
# Layout (looking at the sidebar):
#   LEFT column (cx≈0.027): 5 nav items stacked vertically
#     編成 / 補給 / 改装 / 入渠 / 工廠  (top→bottom, 34×46px each, 60px spacing)
#   RIGHT side (cx≈0.092): 母港 button (32×80px, larger)
#     — different from back_port (top-left teal circle)
#
# Selected state: when on one of the 5 screens, that item shifts right cx 0.027→0.092
#   + grows taller (46→80px). Example: on 入渠 screen, 入渠 (4th item) shifts;
#   on 編成 screen, 編成 (1st item) shifts. On 出撃 screen: no item is selected.
#   The selected item is NOT clickable (already on that screen).
# For click targets: always use UNSELECTED coords (cx=0.027), w=0.030 (slightly inward).
# ── Popup dismiss regions (universal, reused across repair/hensei/equipment) ──
# When a popup list is open, clicking the LEFT portion of the screen closes it.
# Calibrated from Figma 编成 section (1300:333, 1300:335), 2026-06-05.
#
# Level-2 (ship/equipment LIST popup open): left close area
#   Figma: x=1143,y=186,w=286,h=410 in "编成（選択他舰）" canvas (offset 1032,76)
#   → canvas center (254,315) → frac (0.286, 0.591), w=0.322, h=0.769
#
# Level-3 (confirm popup open): wider close area
#   Figma: x=1143,y=794,w=541,h=410 in "2026-06-04T18.50.25" canvas (offset 1032,684)
#   → canvas center (381,315) → frac (0.429, 0.591), w=0.608, h=0.769
popups:
  list_dismiss:
    # Dismiss area for level-2 popup (ship/equipment selection list)
    # Right edge trimmed -0.03 from original Figma (user: "right edge come in a bit")
    elements:
      close_area: {x: 0.271, y: 0.591, w: 0.292, h: 0.769, label: 閉じる（リスト）}
  confirm_dismiss:
    # Dismiss area for level-3 popup (confirm/bucket select)
    elements:
      close_area: {x: 0.414, y: 0.591, w: 0.578, h: 0.769, label: 閉じる（確認）}

left_nav:
  elements:
    # 母港 button (RIGHT side, larger) — takes you back to port
    left_nav_home:   {x: 0.092, y: 0.539, w: 0.036, h: 0.150, label: 母港}
    # 5 nav items — all same x=0.027 (unselected position, no selected-state shift)
    # Selected state would shift right but since selected = current screen = not clickable,
    # we only track the uniform unselected click target.
    left_nav_hensei: {x: 0.027, y: 0.319, w: 0.030, h: 0.080, label: 編成}
    left_nav_supply: {x: 0.027, y: 0.432, w: 0.030, h: 0.080, label: 補給}
    left_nav_equip:  {x: 0.027, y: 0.544, w: 0.030, h: 0.080, label: 改装}
    left_nav_repair: {x: 0.027, y: 0.660, w: 0.030, h: 0.080, label: 入渠}
    left_nav_factory: {x: 0.027, y: 0.767, w: 0.030, h: 0.080, label: 工廠}

