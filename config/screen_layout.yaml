  # Layout: 4 fleet tabs top | 2-col × 3-row ship slots | action buttons
  hensei:
    name: 編成
    detect_hint: "api_get_member/deck — fires on entry when data is uncached"
    api_events:
      - api_get_member/deck
    elements:
      # ── Fleet tabs ①②③④ (Figma Rect29-32, all 16×16px, equal size) ──
