  # Nav wheel calibrated from Figma ellipses (node 1:13, 2026-06-04).
  # Figma canvas offset (111,141); all centers = (figma_x+r-111)/889, (figma_y+r-141)/533
  port:
    name: 母港
    detect_hint: "api_port/port event"
    api_events:
      - api_port/port
    elements:
      # ── Navigation wheel ── all CIRCLE, Figma-calibrated ──────────────────
      # 出撃 — large center circle (Figma Ellipse 3: x=256,y=355,w=148,h=148)
      sortie_nav:      {x: 0.246, y: 0.540, w: 0.166, h: 0.278, shape: circle, label: 出撃}
      # 編成 — upper circle (Figma Ellipse 4: x=281,y=240,w=102,h=102)
      hensei_nav:      {x: 0.249, y: 0.281, w: 0.115, h: 0.191, shape: circle, label: 編成}
      # 補給 — left circle (Figma Ellipse 5: x=147,y=337,w=102,h=102)
      supply_nav:      {x: 0.098, y: 0.463, w: 0.115, h: 0.191, shape: circle, label: 補給}
      # 改装 — right circle (Figma Ellipse 6: x=412,y=336,w=102,h=102)
      equipment_nav:   {x: 0.396, y: 0.461, w: 0.115, h: 0.191, shape: circle, label: 改装}
      # 入渠 — lower-left circle (Figma Ellipse 1: x=198,y=493,w=102,h=102)
      repair_nav:      {x: 0.155, y: 0.756, w: 0.115, h: 0.191, shape: circle, label: 入渠}
      # 工廠 — lower-right circle (Figma Ellipse 2: x=362,y=493,w=102,h=102)
      factory_nav:     {x: 0.340, y: 0.756, w: 0.115, h: 0.191, shape: circle, label: 工廠}

